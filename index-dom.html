<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM 调试模式 - js-vue-renderer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; }
    #app { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { createApp } from './src/vue-runtime.js';
    
    const app = await createApp('./src/App.vue');
    app.mount(document.getElementById('app'), { useDOM: true });
  </script>
</body>
</html>
