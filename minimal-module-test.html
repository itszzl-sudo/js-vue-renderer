<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Test</title></head>
<body>
<script type="module">
  console.log('Starting module load...');
  import('./src/vue-runtime.js')
    .then(m => {
      console.log('Module loaded!');
      console.log('Keys:', Object.keys(m));
      document.body.textContent = 'OK: ' + Object.keys(m).join(', ');
    })
    .catch(e => {
      console.error('Error:', e.message);
      document.body.innerHTML = 'Error: ' + e.message + '<pre>' + e.stack + '</pre>';
    });
  console.log('Script executed');
</script>
</body>
</html>
